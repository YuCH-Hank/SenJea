<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>出工登記系統</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="page-header card">
        <div>
          <h1 class="page-title">出工登記系統</h1>
          <p class="page-subtitle">
            支援工程名稱、出工地點、人員出工狀態、工項人數與區間統計表。
          </p>
        </div>
        <nav class="tabs" aria-label="主要功能">
          <button
            type="button"
            class="tab-button is-active"
            data-tab-target="formTab"
          >
            出工登記
          </button>
          <button type="button" class="tab-button" data-tab-target="historyTab">
            歷史資料查詢
          </button>
        </nav>
      </header>

      <main>
        <section id="formTab" class="tab-panel is-active">
          <div class="card">
            <form id="recordForm" class="stack-lg">
              <div class="form-grid form-grid--two">
                <div class="field-group">
                  <label class="field-label" for="projectName">工程名稱</label>
                  <input
                    id="projectName"
                    name="projectName"
                    class="text-input"
                    type="text"
                    placeholder="例如：山鶯線機電工程"
                    required
                  />
                </div>

                <div class="field-group">
                  <label class="field-label" for="workDate">出工日期</label>
                  <input
                    id="workDate"
                    name="workDate"
                    class="text-input"
                    type="date"
                    required
                  />
                </div>
              </div>

              <div class="field-group">
                <label class="field-label">出工地點</label>
                <div class="selection-grid selection-grid--site">
                  <label class="check-chip"
                    ><input type="checkbox" name="site" value="山鶯 S1" />
                    <span>山鶯 S1</span></label
                  >
                  <label class="check-chip"
                    ><input type="checkbox" name="site" value="山鶯 S2" />
                    <span>山鶯 S2</span></label
                  >
                  <label class="check-chip"
                    ><input type="checkbox" name="site" value="山鶯 PCB" />
                    <span>山鶯 PCB</span></label
                  >
                  <label class="check-chip"
                    ><input type="checkbox" name="site" value="山鶯 S2A" />
                    <span>山鶯 S2A</span></label
                  >
                  <label class="check-chip"
                    ><input type="checkbox" name="site" value="光復 KF1" />
                    <span>光復 KF1</span></label
                  >
                  <label class="check-chip"
                    ><input type="checkbox" name="site" value="光復 KF2" />
                    <span>光復 KF2</span></label
                  >
                  <label class="check-chip"
                    ><input type="checkbox" name="site" value="大園" />
                    <span>大園</span></label
                  >
                  <label class="check-chip"
                    ><input type="checkbox" name="site" value="楊梅 YM" />
                    <span>楊梅 YM</span></label
                  >
                </div>
              </div>

              <div class="form-grid form-grid--two">
                <div class="field-group">
                  <label class="field-label">固定出工人員</label>
                  <div class="selection-grid selection-grid--staff">
                    <div class="toggle-card">
                      <span>余承翰</span
                      ><button
                        type="button"
                        class="attendance-toggle"
                        data-name="余承翰"
                        data-value="0"
                      >
                        未出工
                      </button>
                    </div>
                    <div class="toggle-card">
                      <span>向興聖</span
                      ><button
                        type="button"
                        class="attendance-toggle"
                        data-name="向興聖"
                        data-value="0"
                      >
                        未出工
                      </button>
                    </div>
                    <div class="toggle-card">
                      <span>呂龍雄</span
                      ><button
                        type="button"
                        class="attendance-toggle"
                        data-name="呂龍雄"
                        data-value="0"
                      >
                        未出工
                      </button>
                    </div>
                    <div class="toggle-card">
                      <span>陳慶星</span
                      ><button
                        type="button"
                        class="attendance-toggle"
                        data-name="陳慶星"
                        data-value="0"
                      >
                        未出工
                      </button>
                    </div>
                    <div class="toggle-card">
                      <span>郭靖瑋</span
                      ><button
                        type="button"
                        class="attendance-toggle"
                        data-name="郭靖瑋"
                        data-value="0"
                      >
                        未出工
                      </button>
                    </div>
                    <div class="toggle-card">
                      <span>郭俊廷</span
                      ><button
                        type="button"
                        class="attendance-toggle"
                        data-name="郭俊廷"
                        data-value="0"
                      >
                        未出工
                      </button>
                    </div>
                    <div class="toggle-card">
                      <span>鄒永福</span
                      ><button
                        type="button"
                        class="attendance-toggle"
                        data-name="鄒永福"
                        data-value="0"
                      >
                        未出工
                      </button>
                    </div>
                    <div class="toggle-card">
                      <span>徐子凡</span
                      ><button
                        type="button"
                        class="attendance-toggle"
                        data-name="徐子凡"
                        data-value="0"
                      >
                        未出工
                      </button>
                    </div>
                    <div class="toggle-card">
                      <span>石雅龍</span
                      ><button
                        type="button"
                        class="attendance-toggle"
                        data-name="石雅龍"
                        data-value="0"
                      >
                        未出工
                      </button>
                    </div>
                  </div>
                </div>

                <div class="field-group">
                  <label class="field-label">工項／協力廠商人數</label>
                  <div class="selection-grid selection-grid--count">
                    <label class="count-card"
                      ><span>吊掛</span
                      ><input
                        type="number"
                        name="peopleCount"
                        data-name="吊掛"
                        class="text-input text-input--small"
                        min="0"
                        value="0"
                    /></label>
                    <label class="count-card"
                      ><span>洗孔</span
                      ><input
                        type="number"
                        name="peopleCount"
                        data-name="洗孔"
                        class="text-input text-input--small"
                        min="0"
                        value="0"
                    /></label>
                    <label class="count-card"
                      ><span>防火填塞</span
                      ><input
                        type="number"
                        name="peopleCount"
                        data-name="防火填塞"
                        class="text-input text-input--small"
                        min="0"
                        value="0"
                    /></label>
                    <label class="count-card"
                      ><span>弘憶</span
                      ><input
                        type="number"
                        name="peopleCount"
                        data-name="弘憶"
                        class="text-input text-input--small"
                        min="0"
                        value="0"
                    /></label>
                    <label class="count-card"
                      ><span>詠業</span
                      ><input
                        type="number"
                        name="peopleCount"
                        data-name="詠業"
                        class="text-input text-input--small"
                        min="0"
                        value="0"
                    /></label>
                    <label class="count-card"
                      ><span>聖勳</span
                      ><input
                        type="number"
                        name="peopleCount"
                        data-name="聖勳"
                        class="text-input text-input--small"
                        min="0"
                        value="0"
                    /></label>
                    <label class="count-card"
                      ><span>帝律</span
                      ><input
                        type="number"
                        name="peopleCount"
                        data-name="帝律"
                        class="text-input text-input--small"
                        min="0"
                        value="0"
                    /></label>
                    <label class="count-card"
                      ><span>頂成</span
                      ><input
                        type="number"
                        name="peopleCount"
                        data-name="頂成"
                        class="text-input text-input--small"
                        min="0"
                        value="0"
                    /></label>
                    <label class="count-card"
                      ><span>兆又昌</span
                      ><input
                        type="number"
                        name="peopleCount"
                        data-name="兆又昌"
                        class="text-input text-input--small"
                        min="0"
                        value="0"
                    /></label>
                    <label class="count-card"
                      ><span>其他</span
                      ><input
                        type="number"
                        name="peopleCount"
                        data-name="其他"
                        class="text-input text-input--small"
                        min="0"
                        value="0"
                    /></label>
                  </div>
                </div>
              </div>

              <div class="action-row">
                <button type="submit" class="button button--primary">
                  送出登記
                </button>
                <span
                  id="statusMessage"
                  class="status-message"
                  aria-live="polite"
                ></span>
              </div>
            </form>
          </div>
        </section>

        <section id="historyTab" class="tab-panel">
          <div class="card stack-lg">
            <div class="toolbar-grid">
              <div class="field-group">
                <label class="field-label" for="searchInput">關鍵字搜尋</label>
                <input
                  id="searchInput"
                  class="text-input"
                  type="text"
                  placeholder="搜尋工程名稱、地點、人員、日期"
                />
              </div>
              <div class="field-group">
                <label class="field-label" for="filterProjectName"
                  >工程名稱篩選</label
                >
                <input
                  id="filterProjectName"
                  class="text-input"
                  type="text"
                  placeholder="可輸入部分工程名稱"
                />
              </div>
              <div class="field-group">
                <label class="field-label" for="startDate">開始日期</label>
                <input id="startDate" class="text-input" type="date" />
              </div>
              <div class="field-group">
                <label class="field-label" for="endDate">結束日期</label>
                <input id="endDate" class="text-input" type="date" />
              </div>
            </div>

            <div class="action-row action-row--wrap">
              <button
                type="button"
                id="reloadBtn"
                class="button button--secondary"
              >
                重新整理
              </button>
              <button
                type="button"
                id="exportBtn"
                class="button button--secondary"
              >
                匯出 CSV
              </button>
              <div id="historyCount" class="muted-text">讀取中...</div>
            </div>

            <div class="stack-md">
              <div>
                <h2 class="section-title">區間統計表</h2>
                <p class="section-subtitle">
                  縱向為日期，橫向為人員／工項。數值為 0 時會以灰底顯示。
                </p>
              </div>
              <div id="summaryTableWrap"></div>
            </div>

            <div class="stack-md">
              <h2 class="section-title">歷史紀錄</h2>
              <div id="historyList" class="stack-md"></div>
            </div>
          </div>
        </section>
      </main>
    </div>

    <script src="app.js"></script>
  </body>
</html>
